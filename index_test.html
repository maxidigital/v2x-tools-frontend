<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V2X.tools - Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-4xl mx-auto p-8">
        <h1 class="text-4xl font-bold text-blue-600 mb-4">V2X.tools Test Page</h1>
        <p class="text-gray-700 mb-8">This is a test to ensure the page loads correctly.</p>
        
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-2xl font-semibold mb-4">Convert V2X Messages</h2>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Input</label>
                    <textarea class="w-full h-32 p-3 border rounded" placeholder="Paste V2X message here..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Output</label>
                    <div class="w-full h-32 p-3 border rounded bg-gray-50">JSON output will appear here...</div>
                </div>
            </div>
            <button class="mt-4 bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
                Convert
            </button>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dev console</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'JetBrains Mono', 'Fira Code', monospace; background: #0f1117; color: #e2e8f0; padding: 32px; }
  h1 { font-size: 1rem; color: #475569; margin-bottom: 32px; }
  .section { margin-bottom: 32px; }
  .section-title { font-size: 0.75rem; color: #475569; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
  .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  input[type=number] { background: #1e2433; border: 1px solid #2d3748; border-radius: 6px; color: #e2e8f0; padding: 8px 12px; font-family: inherit; font-size: 0.875rem; width: 100px; }
  input[type=text] { background: #1e2433; border: 1px solid #2d3748; border-radius: 6px; color: #e2e8f0; padding: 8px 12px; font-family: inherit; font-size: 0.875rem; width: 280px; }
  button { background: #1e3a5f; border: 1px solid #2563eb; border-radius: 6px; color: #60a5fa; padding: 8px 16px; font-family: inherit; font-size: 0.875rem; cursor: pointer; }
  button:hover { background: #1e4a8f; }
  button.danger { background: #3b1a1a; border-color: #dc2626; color: #f87171; }
  button.danger:hover { background: #5a1a1a; }
  .output { background: #1e2433; border: 1px solid #2d3748; border-radius: 8px; padding: 16px; font-size: 0.8rem; color: #94a3b8; min-height: 48px; white-space: pre-wrap; word-break: break-all; margin-top: 8px; }
  .ok { color: #34d399; }
  .err { color: #f87171; }
  .label { font-size: 0.75rem; color: #475569; }
</style>
</head>
<body>

<h1>// dev console</h1>

<div class="section">
  <div class="section-title">Repo — Modules</div>
  <div class="row">
    <span class="label">userId</span>
    <input id="userId-modules" type="number" value="0">
    <button onclick="getModules()">GET all modules</button>
    <button onclick="getMessages()">GET messages only</button>
  </div>
  <div class="output" id="out-modules">—</div>
</div>

<div class="section">
  <div class="section-title">Engine — Load</div>
  <div class="row">
    <span class="label">userId</span>
    <input id="userId-load" type="number" value="0">
    <span class="label">aliases (comma separated)</span>
    <input id="aliases-load" type="text" value="cam_v2">
    <button onclick="loadAliases()">POST load</button>
  </div>
  <div class="output" id="out-load">—</div>
</div>

<div class="section">
  <div class="section-title">Engine — Aliases</div>
  <div class="row">
    <span class="label">userId</span>
    <input id="userId-aliases" type="number" value="0">
    <button onclick="getAliases()">GET aliases</button>
    <button class="danger" onclick="evictEngine()">DELETE engine</button>
  </div>
  <div class="output" id="out-aliases">—</div>
</div>

<script>
  const API  = 'https://v2x-tools-backend-production.up.railway.app';
  const REPO = 'https://v2x-tools-repo-production.up.railway.app';

  async function call(method, url, body, outId) {
    const out = document.getElementById(outId);
    out.textContent = 'loading...';
    out.className = 'output';
    try {
      const opts = { method, headers: {} };
      if (body) { opts.body = body; opts.headers['Content-Type'] = 'application/json'; }
      const res = await fetch(url, opts);
      const text = await res.text();
      try { out.textContent = JSON.stringify(JSON.parse(text), null, 2); }
      catch { out.textContent = text; }
      out.classList.add(res.ok ? 'ok' : 'err');
    } catch (e) {
      out.textContent = e.message;
      out.classList.add('err');
    }
  }

  function getModules() {
    const userId = document.getElementById('userId-modules').value;
    call('GET', `${REPO}/api/modules/by-user?userId=${userId}`, null, 'out-modules');
  }

  function getMessages() {
    const userId = document.getElementById('userId-modules').value;
    call('GET', `${REPO}/api/modules/messages?userId=${userId}`, null, 'out-modules');
  }

  function loadAliases() {
    const userId = document.getElementById('userId-load').value;
    const aliases = document.getElementById('aliases-load').value
      .split(',').map(s => s.trim()).filter(Boolean);
    call('POST', `${API}/api/engine/${userId}/load`, JSON.stringify(aliases), 'out-load');
  }

  function getAliases() {
    const userId = document.getElementById('userId-aliases').value;
    call('GET', `${API}/api/engine/${userId}/aliases`, null, 'out-aliases');
  }

  function evictEngine() {
    const userId = document.getElementById('userId-aliases').value;
    call('DELETE', `${API}/api/engine/${userId}`, null, 'out-aliases');
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V2X.tools</title>
    
    <!-- SEO Protection - Prevent indexing -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noodp, noimageindex, notranslate">
    <meta name="googlebot" content="noindex, nofollow">
    <meta name="bingbot" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#3498db',
              secondary: '#2c3e50',
              background: '#ecf0f1',
              textColor: '#333',
              border: '#bdc3c7',
              success: '#2ecc71',
              error: '#e74c3c',
            },
            fontFamily: {
              'sans': ['Inter', 'sans-serif'],
              'mono': ['Roboto Mono', 'monospace'],
              'display': ['Montserrat', 'sans-serif']
            }
          }
        }
      }
    </script>
	<link rel="stylesheet" href="styles.css">
    <!-- 
    DESIGN REQUIREMENTS:
    1. Page must adapt to window size without vertical scrolling
    2. Utility buttons (copy/expand) must always be positioned exactly 3px from their textareas
    3. Layout should handle different screen sizes while preserving component proportions
    -->
    <style>
        :root {
		  --primary-color: #3498db;
		  --secondary-color: #2c3e50;
		  --background-color: #ecf0f1;
		  --text-color: #333;
		  --border-color: #bdc3c7;
		  --success-color: #2ecc71;
		  --error-color: #e74c3c;
		}

        body {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--secondary-color);
            margin: 0;
            padding: 20px;
            height: 100vh;
            /* Permitir scrolling en dispositivos móviles */
            overflow-y: auto;
            overflow-x: hidden;
            
            @media (min-width: 768px) {
                /* En pantallas grandes mantener overflow hidden */
                overflow: hidden;
            }
        }

        .container {
            max-width: 95%;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            height: calc(100vh - 40px);
            overflow: auto;
            display: flex;
            flex-direction: column;
        }
        
        /* Layout horizontal */
        .step-container {
            flex: 1;
            overflow: auto;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            min-height: 0; /* Critical for Firefox */
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .logo {
            width: 100px;
            height: auto;
            margin-right: 20px;
        }

        h1, h2, h3 {
            color: var(--primary-color);
            font-weight: 500;
        }

        h1 {
            margin: 0;
        }
        
        h2 {
            margin-top: 5px;
            margin-bottom: 5px;
            font-size: 1.3em;
        }

        .step {
            margin-bottom: 10px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .radio-group label {
            display: inline-block;
            margin-right: 15px;
            cursor: pointer;
        }

        select, textarea, button {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
        }

        select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.5);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-dark);
        }
        
        #clearInputButton:hover:not(:disabled),
        #clearButton:hover:not(:disabled) {
            background-color: #c0392b;
        }

        button:disabled {
            background-color: var(--border-color);
            cursor: not-allowed;
        }

        #textAreaInput.readonly {
            background-color: #e8e8e8;
            cursor: not-allowed;
        }

        .hidden {
            display: none;
        }

        /* #bytes-len {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
        } */

        .output-section {
            margin-top: 20px;
        }

        #outputTextArea {
            background-color: #f0f0f0;
        }

        .impressum {
            margin-top: 10px;
            font-size: 12px;
            color: #95a5a6;
            text-align: center;
            flex-shrink: 0;
        }

        .disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            transition: opacity 0.3s ease-in-out;
        }
        .toast.hidden {
            opacity: 0;
        }
        .toast.visible {
            opacity: 1;
        }

        .api-doc-link {
            margin-top: 10px;
            text-align: center;
        }

        .api-doc-link a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .api-doc-link a:hover {
            text-decoration: underline;
        }
        
        /* Estilos para los botones de payload */
        .payload-button {
            background-color: #e2e8f0;
            color: #4a5568;
            transition: background-color 0.3s;
        }
        
        .payload-button:hover {
            background-color: #cbd5e0;
        }
        
        .payload-button.active {
            background-color: var(--primary-color);
            color: white;
        }
        
        .payload-button.active:hover {
            background-color: var(--primary-color);
        }
        
        /* Tab Panel Styles */
        .tab-button {
            position: relative;
            transition: all 0.3s ease;
        }
        
        .tab-button:hover {
            color: var(--primary-color);
        }
        
        .tab-button.active {
            color: var(--primary-color);
        }
        
        .tab-button.active:after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--primary-color);
        }
        
        .tab-pane {
            display: none;
        }
        
        .tab-pane.active {
            display: block;
        }
        
        /* Clases de utilidad para colores */
        .text-warning {
            color: #f39c12 !important;
        }
        
        /* Tooltip styles */
        .tooltip {
            position: absolute;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        
        .tooltip::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 4px;
            border-style: solid;
            border-color: #1f2937 transparent transparent transparent;
        }
        
        .group:hover .tooltip {
            opacity: 1;
        }
        
        .dark .tooltip {
            background-color: #4B5563;
        }
        
        .dark .tooltip::after {
            border-color: #4B5563 transparent transparent transparent;
        }
    </style>
</head>

                            <button id="shareButton" class="w-16 p-1 bg-purple-500 hover:bg-purple-600 text-white flex items-center justify-center rounded mr-1.5 disabled:bg-gray-300 disabled:hover:bg-gray-300 disabled:cursor-not-allowed group relative">

                                  <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/>
                                </svg>
                                <span class="tooltip absolute invisible group-hover:visible bg-gray-800 text-white text-xs rounded py-1 px-2 -mt-12 mx-auto left-1/2 transform -translate-x-1/2 w-40 z-10">Share via email</span>
                            </button>
                            <button id="expandButton" class="w-16 p-1 bg-success hover:bg-green-600 text-white flex items-center justify-center rounded mr-1.5 disabled:bg-gray-300 disabled:hover:bg-gray-300 disabled:cursor-not-allowed group relative">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                                  <path d="M15 3l2.3 2.3-2.89 2.87 1.42 1.42L18.7 6.7 21 9V3h-6zM3 9l2.3-2.3 2.87 2.89 1.42-1.42L6.7 5.3 9 3H3v6zm6 12l-2.3-2.3 2.89-2.87-1.42-1.42L5.3 17.3 3 15v6h6zm12-6l-2.3 2.3-2.87-2.89-1.42 1.42 2.89 2.87L15 21h6v-6z"/>
                                </svg>
                                <span class="tooltip absolute invisible group-hover:visible bg-gray-800 text-white text-xs rounded py-1 px-2 -mt-12 mx-auto left-1/2 transform -translate-x-1/2 w-40 z-10">Open in new window</span>
                            </button>
                            <button id="copyButton" class="w-16 p-1 bg-primary hover:bg-blue-500 text-white flex items-center justify-center rounded disabled:bg-gray-300 disabled:hover:bg-gray-300 disabled:cursor-not-allowed">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                                  <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
                </div>
            </div>
        </div>

        <footer class="mt-1 text-xs text-gray-500 dark:text-gray-400 text-center flex-shrink-0">
            <a href="doc/index.html" target="_blank" class="text-primary hover:underline">API Documentation</a>
            <span class="mx-2">|</span>
            <a href="contact.html" target="_blank" class="text-primary hover:underline">Contact</a>
        </footer>
    </div>

    <div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-black/80 text-white px-5 py-2.5 rounded transition-opacity duration-300 opacity-0">Copied to clipboard</div>

    <!-- Modal para compartir por email -->
    <div id="shareModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-lg max-w-md w-full">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white whitespace-nowrap">Share Conversion</h3>
                <button id="closeShareModal" class="text-gray-400 hover:text-gray-500 dark:hover:text-gray-300 focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <form id="shareForm">
                <div class="mb-4">
                    <label for="emailInput" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
                    <input type="email" id="emailInput" name="email" required
                        class="w-full p-2 border border-gray-300 dark:border-gray-600 rounded-md focus:outline-none focus:ring focus:ring-primary/30 dark:bg-gray-700 dark:text-white"
                        placeholder="Enter recipient's email">
                </div>
                <div id="shareError" class="text-red-500 text-sm mb-4 hidden"></div>
                <div id="shareSuccess" class="text-green-500 text-sm mb-4 hidden">Email sent successfully!</div>
                <div class="flex justify-end space-x-3">
                    <button type="button" id="cancelShareBtn" 
                        class="px-4 py-2 bg-gray-300 hover:bg-gray-400 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-800 dark:text-white rounded">
                        Cancel
                    </button>
                    <button type="submit" id="sendEmailBtn"
                        class="px-4 py-2 bg-purple-500 text-white rounded transition-colors">
                        Send
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="v2xConverter.js"></script>
</body>
</html>

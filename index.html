<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/images/favicon.ico" />
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Convert, decode, generate and inspect ASN.1 / V2X (ETSI ITS) messages — CAM, DENM, CPM, MAPEM, SPATEM — across UPER, WER, XML (XER) and JSON (JER). Free, in your browser."
    />
    <title>asn1click Web Tools — ASN.1 &amp; V2X message converter, decoder &amp; inspector</title>
    <!-- No-flash theme: apply saved theme before paint -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('v2x-theme');
          var dark = t ? t === 'dark' : true;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Analytics (gtag + Umami), consumed by src/services/analytics.ts -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-EGM7LYNG67"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      gtag('config', 'G-EGM7LYNG67');
    </script>
    <script
      defer
      src="https://cloud.umami.is/script.js"
      data-website-id="18b30b9d-90d2-4f01-9668-36985baa91c3"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/images/favicon.ico" />
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Free online UPER decoder and V2X message converter. Decode and convert ASN.1 / ETSI ITS messages (CAM, DENM, CPM, MAPEM, SPATEM) between UPER, WER, XER and JER."
    />
    <title>V2X.tools — Free UPER Decoder &amp; V2X Message Converter</title>
    <!-- No-flash theme: apply saved theme before paint -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('v2x-theme');
          var dark = t ? t === 'dark' : true;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      gtag('config', 'G-EGM7LYNG67');

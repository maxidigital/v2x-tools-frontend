<!DOCTYPE html>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f1117;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .wordmark {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            color: #f1f5f9;
            letter-spacing: -0.02em;
            margin-bottom: 32px;
        }

        .wordmark span {
            color: #4b5563;
            font-weight: 600;
        }

        .icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 24px;
            background: #1e2433;
            border: 1px solid #2d3748;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon svg {
            width: 28px;
            height: 28px;
            stroke: #f59e0b;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 12px;
        }

        p {
            font-size: 0.9rem;
            color: #94a3b8;
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .divider {
            border: none;
            border-top: 1px solid #1e2433;
            margin-bottom: 24px;
        }

        a.contact-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #3b82f6;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid #2563eb;
            border-radius: 8px;
            background: #1e2a4a;
            transition: background 0.15s;
        }

        a.contact-link:hover {
            background: #1e3a6a;
        }

        .footer-note {
            margin-top: 40px;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.7rem;
            color: #334155;
        }

    <div class="card">
